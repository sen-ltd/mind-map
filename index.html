<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Map — SVG Editor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Toolbar -->
  <header class="toolbar" role="toolbar" aria-label="Mind Map Tools">
    <div class="toolbar-left">
      <span class="app-title" data-i18n="appTitle">Mind Map</span>
      <button id="btn-new" class="btn" data-i18n="newMap">New</button>
      <button id="btn-import" class="btn" data-i18n="importBtn">Import</button>

      <!-- Export dropdown -->
      <div class="dropdown">
        <button class="btn" data-i18n="exportBtn">Export ▾</button>
        <div class="dropdown-menu">
          <button id="btn-export-svg" class="dropdown-item" data-i18n="exportSVG">Export SVG</button>
          <button id="btn-export-png" class="dropdown-item" data-i18n="exportPNG">Export PNG</button>
          <button id="btn-export-md" class="dropdown-item" data-i18n="exportMarkdown">Export Markdown</button>
          <button id="btn-export-opml" class="dropdown-item" data-i18n="exportOPML">Export OPML</button>
          <button id="btn-export-json" class="dropdown-item" data-i18n="exportJSON">Export JSON</button>
        </div>
      </div>
    </div>

    <div class="toolbar-right">
      <!-- Zoom controls -->
      <button id="btn-zoom-out" class="btn btn-icon" title="Zoom Out (-)">−</button>
      <button id="btn-zoom-reset" class="btn btn-icon" title="Reset View (Ctrl+0)">⊙</button>
      <button id="btn-zoom-in" class="btn btn-icon" title="Zoom In (+)">+</button>

      <button id="btn-theme" class="btn btn-icon" title="Toggle Theme" data-i18n-title="themeToggle">☀</button>
      <button id="btn-lang" class="btn" data-i18n="langToggle">日本語</button>
      <button id="btn-help" class="btn btn-icon" title="Help" data-i18n-title="helpBtn">?</button>
    </div>
  </header>

  <!-- Canvas -->
  <main class="canvas-container">
    <svg id="mind-map-svg" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mind Map Canvas">
      <defs>
        <filter id="node-shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15" />
        </filter>
      </defs>
      <g id="svg-group"></g>
    </svg>
  </main>

  <!-- Status bar -->
  <footer class="status-bar" role="status" aria-live="polite">
    <span id="status-nodes">0 nodes</span>
    <span class="sep">|</span>
    <span id="status-depth">depth: 0</span>
    <span class="sep">|</span>
    <span id="status-saved"></span>
  </footer>

  <!-- Help modal -->
  <div id="help-modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="help-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="help-title" data-i18n="shortcutsTitle">Keyboard Shortcuts</h2>
        <button id="help-close" class="btn btn-icon close-btn" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <table class="shortcuts-table">
          <tbody>
            <tr><td><kbd data-i18n="shortcutTab">Tab</kbd></td><td data-i18n="addChild">Add Child</td></tr>
            <tr><td><kbd data-i18n="shortcutEnter">Enter</kbd></td><td data-i18n="addSibling">Add Sibling</td></tr>
            <tr><td><kbd data-i18n="shortcutDelete">Del / Backspace</kbd></td><td data-i18n="deleteNode">Delete Node</td></tr>
            <tr><td><kbd data-i18n="shortcutF2">F2</kbd></td><td data-i18n="editNode">Edit Node</td></tr>
            <tr><td><kbd>Space</kbd></td><td data-i18n="collapseExpand">Collapse/Expand</td></tr>
            <tr><td><kbd data-i18n="shortcutArrows">← ↑ ↓ →</kbd></td><td data-i18n="navUp">Navigate</td></tr>
            <tr><td><kbd data-i18n="shortcutCtrlZ">Ctrl+Z</kbd></td><td data-i18n="undo">Undo</td></tr>
            <tr><td><kbd data-i18n="shortcutCtrlShiftZ">Ctrl+Shift+Z</kbd></td><td data-i18n="redo">Redo</td></tr>
            <tr><td><kbd>+ / −</kbd></td><td data-i18n="zoomIn">Zoom In / Out</td></tr>
            <tr><td><kbd>Ctrl+0</kbd></td><td data-i18n="resetView">Reset View</td></tr>
            <tr><td>Double-click</td><td data-i18n="editNode">Edit Node</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Import modal -->
  <div id="import-modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="import-title">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="import-title" data-i18n="importBtn">Import</h2>
        <button id="import-cancel" class="btn btn-icon close-btn" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <label for="import-format">Format:</label>
        <select id="import-format" class="select">
          <option value="markdown" data-i18n="importMarkdown">Markdown</option>
          <option value="opml" data-i18n="importOPML">OPML</option>
          <option value="json" data-i18n="importJSON">JSON</option>
        </select>
        <textarea
          id="import-textarea"
          class="import-textarea"
          placeholder="Paste your content here..."
          rows="10"
          spellcheck="false"
        ></textarea>
        <div class="modal-actions">
          <button id="import-confirm" class="btn btn-primary" data-i18n="importBtn">Import</button>
          <button id="import-cancel2" class="btn" data-i18n="close">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
